<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — sullie.dev{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body class="layout-{{ page.layout | default: 'default' }}">

<header class="nav">
  <div class="nav-inner">
    <a class="logo" href="{{ '/' | relative_url }}"><span class="logo-dot"></span>sullie.dev</a>
    <nav class="links" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}#about">about</a>
      <a href="{{ '/' | relative_url }}#homelab">homelab</a>
      <a href="{{ '/writeups/' | relative_url }}">writeups</a>
      <a href="{{ '/' | relative_url }}#contact">contact</a>
    </nav>
    <button class="mobile-menu-toggle" type="button" aria-controls="mobile-menu-panel" aria-expanded="false">
      <span>Menu</span>
      <span class="mobile-menu-icon" aria-hidden="true"></span>
    </button>
  </div>
  <nav class="mobile-menu-panel" id="mobile-menu-panel" aria-label="Mobile navigation">
    <a href="{{ '/' | relative_url }}#about">about</a>
    <a href="{{ '/' | relative_url }}#homelab">homelab</a>
    <a href="{{ '/writeups/' | relative_url }}">writeups</a>
    <a href="{{ '/' | relative_url }}#contact">contact</a>
  </nav>
</header>

{{ content }}

{% unless page.hide_footer %}
<footer class="site-footer">
  sullie.dev — built by hand, not by template.
</footer>
{% endunless %}

{% if page.terminal_log %}
<script src="{{ '/assets/js/terminal.js' | relative_url }}"></script>
{% endif %}
<script src="{{ '/assets/js/mobile-nav.js' | relative_url }}"></script>

</body>
</html>
